name: Continuous Integration

on:
  pull_request:
  push:
    branches-ignore:
      - main
  workflow_dispatch:

permissions: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend-verify:
    name: Frontend Verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20.19.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --ignore-scripts --legacy-peer-deps

      - name: Build frontend
        working-directory: frontend
        env:
          CI: true
          VITE_DATA_MODE: static
        run: npm run build

  backend-verify:
    name: Backend Verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@8d9ed9ac349e1b1ade7b56e28b7b2ee3cb1d9902
        with:
          python-version: 3.12.9
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Create isolated virtual environment
        run: python -m venv .venv-ci

      - name: Install backend dependencies
        run: .venv-ci/bin/pip install -r backend/requirements.txt

      - name: Compile Python sources
        run: .venv-ci/bin/python -m py_compile public/export_to_frontend.py backend/app.py backend/Dispersion_Skew_Backtest.py

      - name: Import backend modules
        run: .venv-ci/bin/python -c "import backend.app; import backend.Dispersion_Skew_Backtest as ds; assert callable(ds.main)"

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Check out source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@ce64ddc50e5f4f0935325790618d6e8d1000f93b
        with:
          languages: javascript-typescript,python
          build-mode: none

      - name: Analyze with CodeQL
        uses: github/codeql-action/analyze@ce64ddc50e5f4f0935325790618d6e8d1000f93b
